name: Smart CI/CD Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Validate scripts
        run: |
          bash -n root_pixel.sh || exit 1
          bash -n device.sh || exit 1
          bash -n checks.sh || exit 1
          bash -n menu.sh || exit 1

      - name: Get last tag
        id: lasttag
        run: |
          git fetch --tags
          echo "LAST_TAG=$(git describe --tags --abbrev=0 || echo v4.0.0)" >> $GITHUB_ENV

      - name: Calculate new version
        id: version
        run: |
          LAST=${{ env.LAST_TAG }}

          BASE=$(echo $LAST | cut -d. -f1 | tr -d 'v')
          MAJOR=$(echo $LAST | cut -d. -f2)
          MINOR=$(echo $LAST | cut -d. -f3)

          # detect changes
          CHANGES=$(git diff --name-only HEAD~1 HEAD)

          echo "Changed files: $CHANGES"

          BUMP="patch"

          if echo "$CHANGES" | grep -E "PLUGINS|device|menu" >/dev/null; then
            BUMP="minor"
          fi

          if echo "$CHANGES" | grep -E "root_pixel.sh|CORE" >/dev/null; then
            BUMP="major"
          fi

          if [ "$BUMP" = "major" ]; then
            BASE=$((BASE+1)); MAJOR=0; MINOR=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR+1))
          else
            MINOR=$((MINOR+1))
          fi

          NEW_TAG="v${BASE}.${MAJOR}.${MINOR}"

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "BUMP=$BUMP" >> $GITHUB_ENV

      - name: Create Tag
        run: |
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: "NAGATO ROOT KIT ${{ env.NEW_TAG }}"
          body: |
            🚀 Auto CI/CD Release

            🔧 Change Type: ${{ env.BUMP }}

            ✔ Auto-generated by GitHub Actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
